<!DOCTYPE html>
<html>
<head>
    <title>Scoreboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin:0; padding:0; height:100%; background:black; font-family:Arial; }
        
        #setup { 
            position:absolute; top:15%; left:10%; width:80%; height:60%; 
            background:#222; border-radius:20px; display:flex; 
            flex-direction:column; align-items:center; justify-content:center; color:white;
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
        }
        input { width:85%; padding:20px; font-size:22px; margin:20px 0; border-radius:10px; }
        button { padding:20px 40px; font-size:20px; background:#0066cc; color:white; border:none; border-radius:10px; cursor:pointer; margin-top:10px; }

        #widget { position:absolute; top:0; left:0; width:100%; height:100%; display:none; }
        #exit-btn {
            position: fixed; bottom: 30px; left: 30px; background: #c00; color: white; 
            border: none; padding: 15px 25px; border-radius: 30px; font-size: 18px; z-index: 999999; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="setup">
        <h1>Scoreboard Setup</h1>
        <p>Paste Widget ID below:</p>
        <input type="text" id="widgetInput" placeholder="Paste ID here">
        <button onclick="saveAndStart()">Save & Start</button>
    </div>

    <div id="widget">
        <div id="gc-schedule-widget-s3gt"></div>
        <button id="exit-btn" onclick="exitKiosk()">Exit to Desktop</button>
    </div>

    <script src="https://widgets.gc.com/static/js/sdk.v1.js"></script>
    <script>
        const savedId = localStorage.getItem('widgetId');
        if (savedId) document.getElementById('widgetInput').value = savedId;

        if (savedId) {
            startWidget(savedId);
        }

        function saveAndStart() {
            const id = document.getElementById('widgetInput').value.trim();
            if (id.length > 10) {
                localStorage.setItem('widgetId', id);
                startWidget(id);
            } else {
                alert("Please paste a valid Widget ID");
            }
        }

        function startWidget(id) {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('widget').style.display = 'block';
            window.GC.team.schedule.init({
                target: "#gc-schedule-widget-s3gt",
                widgetId: id
            });
        }

        function exitKiosk() {
            window.open('', '_self').close();
        }
    </script>
</body>
</html>
