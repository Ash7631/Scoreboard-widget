<!DOCTYPE html>
<html>
<head>
    <title>Scoreboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin:0; padding:0; height:100%; background:black; font-family:Arial; }
        
        #setup { 
            position:absolute; top:10%; left:8%; width:84%; height:55%; 
            background:#1f1f1f; border-radius:20px; display:flex; 
            flex-direction:column; align-items:center; justify-content:center; color:white;
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
        }
        input { 
            width:85%; padding:22px; font-size:24px; margin:25px 0; border-radius:10px; 
        }
        button { 
            padding:18px 40px; font-size:20px; background:#0066cc; color:white; 
            border:none; border-radius:10px; cursor:pointer; margin-top:10px; 
        }

        #widget { position:absolute; top:0; left:0; width:100%; height:100%; display:none; }
        #exit-btn {
            position: fixed; bottom: 30px; left: 30px; background: #c00; color: white; 
            border: none; padding: 15px 25px; border-radius: 30px; font-size: 18px; z-index: 999999; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="setup">
        <h1>Scoreboard Setup</h1>
        <p>Paste your GameChanger Widget ID:</p>
        <input type="text" id="widgetInput" placeholder="87a03322-bc62-45e4-aa6e-f2cc4310c481">
        <button onclick="saveAndStart()">Save & Start Scoreboard</button>
    </div>

    <div id="widget">
        <div id="gc-schedule-widget-s3gt"></div>
        <button id="exit-btn" onclick="exitKiosk()">Exit to Desktop</button>
    </div>

    <script src="https://widgets.gc.com/static/js/sdk.v1.js"></script>
    <script>
        const savedId = localStorage.getItem('widgetId');
        if (savedId) {
            document.getElementById('widgetInput').value = savedId;
        }

        if (savedId) {
            startWidget(savedId);
        }

        function saveAndStart() {
            const id = document.getElementById('widgetInput').value.trim();
            if (id.length > 15) {
                localStorage.setItem('widgetId', id);
                startWidget(id);
            } else {
                alert("Widget ID looks too short. Please paste the full code from GameChanger.");
            }
        }

        function startWidget(id) {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('widget').style.display = 'block';
            window.GC.team.schedule.init({
                target: "#gc-schedule-widget-s3gt",
                widgetId: id,
                maxVerticalGamesVisible: 4
            });
        }

        function exitKiosk() {
            window.open('', '_self').close();
            window.location.href = 'about:blank';
        }
    </script>
</body>
</html>
