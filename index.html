<!DOCTYPE html>
<html>
<head>
    <title>Scoreboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin:0; padding:0; height:100%; background:black; overflow:hidden; }
        #gc-schedule-widget-s3gt { width:100% !important; height:100% !important; }
        #exit-btn {
            position: fixed; bottom: 20px; left: 20px; background: rgba(80,80,80,0.95); color: white; border: none;
            padding: 10px 18px; border-radius: 30px; font-size: 15px; z-index: 999999; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="gc-schedule-widget-s3gt"></div>
    <button id="exit-btn" onclick="exitKiosk()">Exit to Desktop</button>

    <script src="https://widgets.gc.com/static/js/sdk.v1.js"></script>
    <script>
        window.GC.team.schedule.init({
            target: "#gc-schedule-widget-s3gt",
            widgetId: "87a03322-bc62-45e4-aa6e-f2cc4310c481",
            maxVerticalGamesVisible: 4
        });

        setInterval(() => {
            document.getElementById('exit-btn').style.display = 'block';
        }, 300);

        function exitKiosk() {
            // This will minimize/close the kiosk window
            window.open('', '_self').close();
            // Fallback
            window.location.href = 'about:blank';
        }
    </script>
</body>
</html>
